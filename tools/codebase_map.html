<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>French SLE Simulator — Codebase Map</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1117; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  .app { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  .sidebar { width: 240px; min-width: 240px; background: #161b27; border-right: 1px solid #2d3748; display: flex; flex-direction: column; overflow-y: auto; }
  .sidebar-section { padding: 12px 14px; border-bottom: 1px solid #2d3748; }
  .sidebar-section h3 { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #718096; margin-bottom: 8px; }

  .preset-btn { display: block; width: 100%; text-align: left; background: #1e2535; border: 1px solid #2d3748; color: #a0aec0; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-bottom: 4px; font-size: 12px; transition: all 0.15s; }
  .preset-btn:hover { background: #2d3748; color: #e2e8f0; }
  .preset-btn.active { background: #2b4a7a; border-color: #3b82f6; color: #93c5fd; }

  .layer-toggle { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; cursor: pointer; }
  .layer-toggle input { cursor: pointer; }
  .layer-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .layer-toggle label { cursor: pointer; color: #a0aec0; font-size: 12px; }

  .conn-toggle { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; cursor: pointer; }
  .conn-line { width: 18px; height: 2px; flex-shrink: 0; }
  .conn-toggle input { cursor: pointer; }
  .conn-toggle label { cursor: pointer; color: #a0aec0; font-size: 12px; }

  .zoom-controls { display: flex; gap: 6px; }
  .zoom-btn { background: #1e2535; border: 1px solid #2d3748; color: #a0aec0; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .zoom-btn:hover { background: #2d3748; color: #e2e8f0; }

  .comments-list { flex: 1; overflow-y: auto; }
  .comment-item { background: #1a2235; border: 1px solid #2d3748; border-radius: 6px; padding: 8px 10px; margin-bottom: 6px; }
  .comment-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .comment-target { font-weight: 600; color: #93c5fd; font-size: 11px; }
  .comment-delete { background: none; border: none; color: #4a5568; cursor: pointer; font-size: 14px; line-height: 1; padding: 0 2px; }
  .comment-delete:hover { color: #ef4444; }
  .comment-text { color: #a0aec0; font-size: 11px; line-height: 1.4; }
  .no-comments { color: #4a5568; font-size: 11px; font-style: italic; text-align: center; padding: 12px 0; }

  /* MAIN AREA */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .canvas-wrap { flex: 1; overflow: hidden; position: relative; cursor: grab; }
  .canvas-wrap:active { cursor: grabbing; }
  #diagram { width: 100%; height: 100%; display: block; }

  /* PROMPT AREA */
  .prompt-area { background: #0d1117; border-top: 1px solid #2d3748; padding: 10px 14px; min-height: 80px; max-height: 160px; display: flex; flex-direction: column; gap: 6px; }
  .prompt-header { display: flex; justify-content: space-between; align-items: center; }
  .prompt-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #4a5568; }
  .copy-btn { background: #1e2535; border: 1px solid #2d3748; color: #a0aec0; padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
  .copy-btn:hover { background: #2d3748; color: #e2e8f0; }
  .copy-btn.copied { background: #14532d; border-color: #16a34a; color: #86efac; }
  #prompt-text { color: #a0aec0; font-size: 12px; line-height: 1.5; font-family: 'Menlo', 'Consolas', monospace; white-space: pre-wrap; overflow-y: auto; flex: 1; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: none; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #1a2235; border: 1px solid #2d3748; border-radius: 10px; padding: 20px; width: 400px; max-width: 90vw; }
  .modal h3 { font-size: 14px; font-weight: 600; color: #e2e8f0; margin-bottom: 2px; }
  .modal .modal-sub { font-size: 11px; color: #4a5568; font-family: monospace; margin-bottom: 12px; }
  .modal textarea { width: 100%; background: #0f1117; border: 1px solid #2d3748; color: #e2e8f0; border-radius: 6px; padding: 8px; font-size: 12px; font-family: system-ui, sans-serif; resize: vertical; min-height: 80px; outline: none; }
  .modal textarea:focus { border-color: #3b82f6; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }
  .modal-cancel { background: #1e2535; border: 1px solid #2d3748; color: #a0aec0; padding: 6px 14px; border-radius: 5px; cursor: pointer; font-size: 12px; }
  .modal-save { background: #1d4ed8; border: none; color: white; padding: 6px 14px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: 600; }
  .modal-save:hover { background: #2563eb; }

  /* SVG node hover */
  .node-group { cursor: pointer; }
  .node-rect { transition: filter 0.15s; }
  .node-group:hover .node-rect { filter: brightness(1.15); }
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
      <h3>View</h3>
      <button class="preset-btn active" data-preset="full">Full System</button>
      <button class="preset-btn" data-preset="exam-flow">Exam Generation Flow</button>
      <button class="preset-btn" data-preset="review-loop">Review & QA Loop</button>
      <button class="preset-btn" data-preset="tools-only">Tools Layer Only</button>
    </div>

    <div class="sidebar-section">
      <h3>Layers</h3>
      <label class="layer-toggle"><input type="checkbox" data-layer="workflow" checked><span class="layer-dot" style="background:#7c3aed"></span><label>Workflows</label></label>
      <label class="layer-toggle"><input type="checkbox" data-layer="ui" checked><span class="layer-dot" style="background:#1d4ed8"></span><label>Streamlit UI</label></label>
      <label class="layer-toggle"><input type="checkbox" data-layer="config" checked><span class="layer-dot" style="background:#b45309"></span><label>Config</label></label>
      <label class="layer-toggle"><input type="checkbox" data-layer="tools" checked><span class="layer-dot" style="background:#047857"></span><label>Tools</label></label>
      <label class="layer-toggle"><input type="checkbox" data-layer="external" checked><span class="layer-dot" style="background:#be185d"></span><label>External / Storage</label></label>
    </div>

    <div class="sidebar-section">
      <h3>Connections</h3>
      <label class="conn-toggle"><input type="checkbox" data-conn="call" checked><span class="conn-line" style="background:#3b82f6"></span><label>Function calls</label></label>
      <label class="conn-toggle"><input type="checkbox" data-conn="data" checked><span class="conn-line" style="background:#10b981;border-top:2px dashed #10b981;height:0"></span><label>Data flow</label></label>
      <label class="conn-toggle"><input type="checkbox" data-conn="api" checked><span class="conn-line" style="background:#f97316"></span><label>API calls</label></label>
      <label class="conn-toggle"><input type="checkbox" data-conn="persist" checked><span class="conn-line" style="background:#6b7280;border-top:2px dotted #6b7280;height:0"></span><label>Persistence</label></label>
    </div>

    <div class="sidebar-section">
      <h3>Zoom</h3>
      <div class="zoom-controls">
        <button class="zoom-btn" id="zoom-in">+</button>
        <button class="zoom-btn" id="zoom-reset">Reset</button>
        <button class="zoom-btn" id="zoom-out">−</button>
      </div>
    </div>

    <div class="sidebar-section" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
      <h3>Comments (<span id="comment-count">0</span>)</h3>
      <p style="font-size:10px;color:#4a5568;margin-bottom:8px;">Click any node to add a comment.</p>
      <div class="comments-list" id="comments-list">
        <div class="no-comments">No comments yet</div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="canvas-wrap" id="canvas-wrap">
      <svg id="diagram" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="prompt-area">
      <div class="prompt-header">
        <span class="prompt-label">Generated Prompt</span>
        <button class="copy-btn" id="copy-btn">Copy</button>
      </div>
      <div id="prompt-text">Click nodes to add comments, then copy the prompt below.</div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Component Name</h3>
    <div class="modal-sub" id="modal-sub">file/path.py</div>
    <textarea id="modal-textarea" placeholder="Add your comment, question, or feedback about this component…"></textarea>
    <div class="modal-actions">
      <button class="modal-cancel" id="modal-cancel">Cancel</button>
      <button class="modal-save" id="modal-save">Save Comment</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ──────────────────────────────────────────────────────────────────

const NODES = [
  // WORKFLOW layer (top)
  { id: 'sle-sop', label: 'SLE Exam SOP', subtitle: 'workflows/sle_exam_simulator.md', x: 320, y: 30, w: 170, h: 44, layer: 'workflow', color: '#3b1f6e', textColor: '#c4b5fd', desc: '9-step SOP: exam generation → review loop → evaluate → feedback review. Single source of truth for process decisions.' },
  { id: 'env', label: '.env / API Keys', subtitle: '.env  |  .env.template', x: 620, y: 30, w: 150, h: 44, layer: 'external', color: '#1f3a2d', textColor: '#6ee7b7', desc: 'DEEPSEEK_API_KEY plus optional GENERATE_*, EVALUATE_*, REVIEW_* overrides.' },

  // UI layer
  { id: 'app', label: 'app.py', subtitle: 'Streamlit UI  |  4 stages', x: 300, y: 140, w: 180, h: 50, layer: 'ui', color: '#172554', textColor: '#93c5fd', desc: 'Orchestrator: Welcome → Setup → Exam → Results. Manages session state, calls tools, runs review loops, surfaces errors to user.' },

  // Config layer
  { id: 'model-config', label: 'ModelConfig', subtitle: 'tools/model_config.py', x: 620, y: 148, w: 155, h: 44, layer: 'config', color: '#431407', textColor: '#fdba74', desc: 'ModelConfig dataclass + load_default_configs(). Single source of truth for API key, base_url, model per tool. Supports per-tool env overrides.' },

  // TOOLS layer
  { id: 'generate', label: 'generate_exam()', subtitle: 'tools/generate_exam.py', x: 80, y: 280, w: 165, h: 50, layer: 'tools', color: '#052e16', textColor: '#86efac', desc: 'Generates contexts→questions JSON via API (temp 0.7). ~50/50 fill-in-blank vs error-id split. Post-generation option shuffling. Saves to .tmp/.' },
  { id: 'regen-ctx', label: 'regenerate_context()', subtitle: 'tools/generate_exam.py', x: 80, y: 380, w: 165, h: 44, layer: 'tools', color: '#052e16', textColor: '#86efac', desc: 'Targeted regeneration of a single context that failed QA. Includes error feedback in prompt. Max 1 retry per context.' },
  { id: 'evaluate', label: 'evaluate_exam()', subtitle: 'tools/evaluate_exam.py', x: 310, y: 280, w: 165, h: 50, layer: 'tools', color: '#052e16', textColor: '#86efac', desc: 'Deterministic scoring + API call for grammar explanations (temp 0.3). Computes C/B/A proficiency level. Appends to user_error_tracking.md.' },
  { id: 'regen-exp', label: 'regenerate_explanations()', subtitle: 'tools/evaluate_exam.py', x: 310, y: 380, w: 165, h: 44, layer: 'tools', color: '#052e16', textColor: '#86efac', desc: 'Regenerates grammar explanations that failed feedback QA. Corrective prompt at temp 0.3. Max 1 retry.' },
  { id: 'review', label: 'review_exam_quality()', subtitle: 'tools/review_exam.py', x: 545, y: 280, w: 165, h: 50, layer: 'tools', color: '#052e16', textColor: '#86efac', desc: 'Conservative QA at temp 0.1. Checks passage grammar, answer key correctness, duplicate options (deterministic). Caps weak_distractor/topic_mismatch at "warning".' },
  { id: 'review-fb', label: 'review_feedback_quality()', subtitle: 'tools/review_exam.py', x: 545, y: 380, w: 165, h: 44, layer: 'tools', color: '#052e16', textColor: '#86efac', desc: 'Validates grammar explanations: accuracy, reasoning, hallucination detection. Temp 0.1. Flags critical issues for regeneration.' },

  // EXTERNAL/STORAGE
  { id: 'deepseek', label: 'DeepSeek API', subtitle: 'api.deepseek.com  |  deepseek-chat', x: 780, y: 280, w: 150, h: 50, layer: 'external', color: '#1f2937', textColor: '#d1d5db', desc: 'Default OpenAI-compatible endpoint. Any OpenAI-compatible API works via base_url swap.' },
  { id: 'tmp', label: '.tmp/', subtitle: 'exam_*.md  |  feedback_*.md', x: 80, y: 490, w: 150, h: 44, layer: 'external', color: '#1f3a2d', textColor: '#6ee7b7', desc: 'Disposable per-session markdown outputs. exam_<session_id>.md and feedback_<session_id>.md.' },
  { id: 'user-track', label: 'user_error_tracking.md', subtitle: 'Persistent  |  cumulative', x: 310, y: 490, w: 165, h: 44, layer: 'external', color: '#1f3a2d', textColor: '#6ee7b7', desc: "User's incorrect answers + explanations, appended each session. Used for long-term error pattern review." },
  { id: 'sys-track', label: 'system_error_tracking.md', subtitle: 'Persistent  |  QA log', x: 545, y: 490, w: 165, h: 44, layer: 'external', color: '#1f3a2d', textColor: '#6ee7b7', desc: 'All review-flagged issues (critical + warning) from both review points. System QA log across sessions.' },
  { id: 'tests', label: 'tests/', subtitle: 'test_model_config.py  |  test_generate_exam.py', x: 780, y: 400, w: 150, h: 44, layer: 'external', color: '#1c1917', textColor: '#a8a29e', desc: '9 tests total: 6 for ModelConfig (wiring, fallbacks, overrides), 3 for generate_exam (ModelConfig wiring, API key validation).' },
];

const CONNECTIONS = [
  // Workflow → UI
  { from: 'sle-sop', to: 'app', type: 'call', label: 'reads SOP' },
  // Env → ModelConfig
  { from: 'env', to: 'model-config', type: 'data', label: 'env vars' },
  // UI → ModelConfig
  { from: 'app', to: 'model-config', type: 'call', label: 'load_default_configs()' },
  // UI → Tools
  { from: 'app', to: 'generate', type: 'call', label: 'generate_exam()' },
  { from: 'app', to: 'evaluate', type: 'call', label: 'evaluate_exam()' },
  { from: 'app', to: 'review', type: 'call', label: 'review_exam_quality()' },
  { from: 'app', to: 'review-fb', type: 'call', label: 'review_feedback_quality()' },
  { from: 'app', to: 'regen-ctx', type: 'call', label: 'on critical flag' },
  { from: 'app', to: 'regen-exp', type: 'call', label: 'on critical flag' },
  // ModelConfig → Tools
  { from: 'model-config', to: 'generate', type: 'data', label: 'ModelConfig' },
  { from: 'model-config', to: 'evaluate', type: 'data', label: 'ModelConfig' },
  { from: 'model-config', to: 'review', type: 'data', label: 'ModelConfig' },
  // Tools → API
  { from: 'generate', to: 'deepseek', type: 'api', label: 'temp 0.7' },
  { from: 'regen-ctx', to: 'deepseek', type: 'api', label: 'temp 0.3' },
  { from: 'evaluate', to: 'deepseek', type: 'api', label: 'temp 0.3' },
  { from: 'review', to: 'deepseek', type: 'api', label: 'temp 0.1' },
  { from: 'review-fb', to: 'deepseek', type: 'api', label: 'temp 0.1' },
  // Regen flow
  { from: 'regen-ctx', to: 'review', type: 'call', label: 're-review' },
  { from: 'regen-exp', to: 'review-fb', type: 'call', label: 're-review' },
  // Storage
  { from: 'generate', to: 'tmp', type: 'persist', label: 'exam_*.md' },
  { from: 'evaluate', to: 'tmp', type: 'persist', label: 'feedback_*.md' },
  { from: 'evaluate', to: 'user-track', type: 'persist', label: 'append errors' },
  { from: 'review', to: 'sys-track', type: 'persist', label: 'log flagged' },
  { from: 'review-fb', to: 'sys-track', type: 'persist', label: 'log flagged' },
  // Tests
  { from: 'tests', to: 'model-config', type: 'data', label: 'unit tests' },
  { from: 'tests', to: 'generate', type: 'data', label: 'integration' },
];

const CONN_STYLES = {
  call:    { color: '#3b82f6', dash: null,    label: 'Function call' },
  data:    { color: '#10b981', dash: '6,3',   label: 'Data flow' },
  api:     { color: '#f97316', dash: null,    label: 'API call' },
  persist: { color: '#6b7280', dash: '3,4',  label: 'Persistence' },
};

const LAYER_COLORS = {
  workflow: '#7c3aed', ui: '#1d4ed8', config: '#b45309', tools: '#047857', external: '#be185d',
};

// ─── STATE ──────────────────────────────────────────────────────────────────
const state = {
  zoom: 1,
  panX: 20,
  panY: 20,
  layers: { workflow: true, ui: true, config: true, tools: true, external: true },
  conns:  { call: true, data: true, api: true, persist: true },
  comments: [],
  activePreset: 'full',
};

const PRESETS = {
  full:       { layers: { workflow:true, ui:true, config:true, tools:true, external:true }, conns: { call:true, data:true, api:true, persist:true } },
  'exam-flow':{ layers: { workflow:true, ui:true, config:true, tools:true, external:false }, conns: { call:true, data:true, api:true, persist:false }, highlight: ['app','generate','regen-ctx','review','model-config','deepseek'] },
  'review-loop':{ layers: { workflow:false, ui:true, config:false, tools:true, external:true }, conns: { call:true, data:false, api:true, persist:true }, highlight: ['app','generate','regen-ctx','review','review-fb','regen-exp','evaluate','sys-track'] },
  'tools-only':{ layers: { workflow:false, ui:false, config:true, tools:true, external:true }, conns: { call:false, data:true, api:true, persist:true } },
};

// ─── MODAL ──────────────────────────────────────────────────────────────────
let modalNode = null;
const modal = document.getElementById('modal');
const modalTitle = document.getElementById('modal-title');
const modalSub = document.getElementById('modal-sub');
const modalTA = document.getElementById('modal-textarea');

function openModal(node) {
  modalNode = node;
  modalTitle.textContent = node.label;
  modalSub.textContent = node.subtitle;
  const existing = state.comments.find(c => c.target === node.id);
  modalTA.value = existing ? existing.text : '';
  modal.classList.add('open');
  setTimeout(() => modalTA.focus(), 50);
}

document.getElementById('modal-cancel').onclick = () => modal.classList.remove('open');
modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });

document.getElementById('modal-save').onclick = () => {
  const text = modalTA.value.trim();
  if (!text) { modal.classList.remove('open'); return; }
  const idx = state.comments.findIndex(c => c.target === modalNode.id);
  if (idx >= 0) state.comments[idx].text = text;
  else state.comments.push({ id: Date.now(), target: modalNode.id, targetLabel: modalNode.label, targetFile: modalNode.subtitle, text });
  modal.classList.remove('open');
  updateAll();
};

// ─── RENDER ─────────────────────────────────────────────────────────────────
const svg = document.getElementById('diagram');
let arrowsAdded = false;

function getNodeCenter(node) {
  return { x: node.x + node.w / 2, y: node.y + node.h / 2 };
}

function getEdgePoint(node, tx, ty) {
  const cx = node.x + node.w / 2, cy = node.y + node.h / 2;
  const dx = tx - cx, dy = ty - cy;
  const scaleX = (node.w / 2) / (Math.abs(dx) || 1);
  const scaleY = (node.h / 2) / (Math.abs(dy) || 1);
  const scale = Math.min(scaleX, scaleY) * 0.92;
  return { x: cx + dx * scale, y: cy + dy * scale };
}

function renderDiagram() {
  const w = svg.clientWidth || 960, h = svg.clientHeight || 600;
  const preset = PRESETS[state.activePreset];
  const highlight = preset.highlight || null;

  // Determine visible nodes
  const visibleNodes = NODES.filter(n => state.layers[n.layer]);
  const visibleIds = new Set(visibleNodes.map(n => n.id));

  // Defs (arrows)
  let defs = `<defs>`;
  Object.entries(CONN_STYLES).forEach(([type, s]) => {
    defs += `<marker id="arr-${type}" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="${s.color}" opacity="0.9"/>
    </marker>`;
  });
  defs += `</defs>`;

  // Group
  let inner = `<g transform="translate(${state.panX},${state.panY}) scale(${state.zoom})">`;

  // Connections
  CONNECTIONS.forEach(c => {
    if (!state.conns[c.type]) return;
    if (!visibleIds.has(c.from) || !visibleIds.has(c.to)) return;
    const nFrom = NODES.find(n => n.id === c.from);
    const nTo   = NODES.find(n => n.id === c.to);
    if (!nFrom || !nTo) return;
    const toC = getNodeCenter(nTo);
    const fromC = getNodeCenter(nFrom);
    const p1 = getEdgePoint(nFrom, toC.x, toC.y);
    const p2 = getEdgePoint(nTo, fromC.x, fromC.y);
    const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2 - 20;
    const s = CONN_STYLES[c.type];
    const dimmed = highlight && (!highlight.includes(c.from) || !highlight.includes(c.to)) ? 0.15 : 0.75;
    const dashAttr = s.dash ? `stroke-dasharray="${s.dash}"` : '';
    inner += `<path d="M${p1.x},${p1.y} Q${mx},${my} ${p2.x},${p2.y}" fill="none" stroke="${s.color}" stroke-width="1.5" ${dashAttr} opacity="${dimmed}" marker-end="url(#arr-${c.type})"/>`;
    if (c.label && state.zoom > 0.75) {
      inner += `<text x="${mx}" y="${my - 4}" text-anchor="middle" font-size="9" fill="${s.color}" opacity="${dimmed * 0.9}" font-family="system-ui">${c.label}</text>`;
    }
  });

  // Nodes
  visibleNodes.forEach(node => {
    const hasComment = state.comments.some(c => c.target === node.id);
    const dimmed = highlight && !highlight.includes(node.id) ? 0.3 : 1;
    const borderColor = hasComment ? '#facc15' : (LAYER_COLORS[node.layer] || '#4a5568');
    const borderWidth = hasComment ? 2 : 1.5;
    inner += `<g class="node-group" data-id="${node.id}" opacity="${dimmed}">
      <rect class="node-rect" x="${node.x}" y="${node.y}" width="${node.w}" height="${node.h}" rx="7" fill="${node.color}" stroke="${borderColor}" stroke-width="${borderWidth}"/>
      <text x="${node.x + node.w/2}" y="${node.y + 16}" text-anchor="middle" font-size="12" font-weight="600" fill="${node.textColor}" font-family="system-ui">${node.label}</text>
      <text x="${node.x + node.w/2}" y="${node.y + 30}" text-anchor="middle" font-size="9.5" fill="${node.textColor}" opacity="0.65" font-family="Menlo,Consolas,monospace">${node.subtitle}</text>
      ${hasComment ? `<circle cx="${node.x + node.w - 8}" cy="${node.y + 8}" r="5" fill="#facc15"/>` : ''}
    </g>`;
  });

  inner += `</g>`;
  svg.innerHTML = defs + inner;

  // Re-attach click handlers
  svg.querySelectorAll('.node-group').forEach(el => {
    el.addEventListener('click', () => {
      const node = NODES.find(n => n.id === el.dataset.id);
      if (node) openModal(node);
    });
    // Tooltip via title
    const node = NODES.find(n => n.id === el.dataset.id);
    if (node) {
      const title = document.createElementNS('http://www.w3.org/2000/svg','title');
      title.textContent = node.desc;
      el.appendChild(title);
    }
  });
}

// ─── COMMENTS SIDEBAR ───────────────────────────────────────────────────────
function renderComments() {
  const list = document.getElementById('comments-list');
  document.getElementById('comment-count').textContent = state.comments.length;
  if (!state.comments.length) {
    list.innerHTML = '<div class="no-comments">No comments yet</div>';
    return;
  }
  list.innerHTML = state.comments.map(c => `
    <div class="comment-item">
      <div class="comment-header">
        <span class="comment-target">${c.targetLabel}</span>
        <button class="comment-delete" data-id="${c.id}">×</button>
      </div>
      <div class="comment-text">${c.text}</div>
    </div>
  `).join('');
  list.querySelectorAll('.comment-delete').forEach(btn => {
    btn.addEventListener('click', () => {
      state.comments = state.comments.filter(c => c.id !== Number(btn.dataset.id));
      updateAll();
    });
  });
}

// ─── PROMPT ─────────────────────────────────────────────────────────────────
function updatePrompt() {
  const pt = document.getElementById('prompt-text');
  if (!state.comments.length) {
    pt.textContent = 'Click any node to add a comment, then copy the prompt below.';
    return;
  }
  const visibleLayers = Object.entries(state.layers).filter(([,v]) => v).map(([k]) => k);
  const allLayers = Object.keys(state.layers);
  const layerNote = visibleLayers.length < allLayers.length
    ? `Viewing layers: ${visibleLayers.join(', ')}.`
    : 'Viewing the full system.';

  let text = `This is the French SLE Written Expression Simulator — an AI-powered exam practice tool. ${layerNote}\n\nArchitecture layers: Workflows (SOP markdown) → Streamlit UI (orchestrator) → Tools (generate/evaluate/review). Uses the WAT framework (Workflows, Agents, Tools).\n\nFeedback on specific components:\n\n`;
  text += state.comments.map(c => `**${c.targetLabel}** (${c.targetFile}):\n${c.text}`).join('\n\n');
  pt.textContent = text;
}

// ─── CONTROLS ───────────────────────────────────────────────────────────────
function applyPreset(presetKey) {
  const preset = PRESETS[presetKey];
  state.activePreset = presetKey;
  Object.assign(state.layers, preset.layers);
  Object.assign(state.conns, preset.conns);
  // Sync checkboxes
  document.querySelectorAll('[data-layer]').forEach(cb => {
    cb.checked = state.layers[cb.dataset.layer];
  });
  document.querySelectorAll('[data-conn]').forEach(cb => {
    cb.checked = state.conns[cb.dataset.conn];
  });
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.preset === presetKey);
  });
}

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => { applyPreset(btn.dataset.preset); updateAll(); });
});
document.querySelectorAll('[data-layer]').forEach(cb => {
  cb.addEventListener('change', () => { state.layers[cb.dataset.layer] = cb.checked; state.activePreset = ''; document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active')); updateAll(); });
});
document.querySelectorAll('[data-conn]').forEach(cb => {
  cb.addEventListener('change', () => { state.conns[cb.dataset.conn] = cb.checked; updateAll(); });
});

document.getElementById('zoom-in').onclick = () => { state.zoom = Math.min(2.5, state.zoom + 0.15); updateAll(); };
document.getElementById('zoom-out').onclick = () => { state.zoom = Math.max(0.3, state.zoom - 0.15); updateAll(); };
document.getElementById('zoom-reset').onclick = () => { state.zoom = 1; state.panX = 20; state.panY = 20; updateAll(); };

// Pan
let dragging = false, lastX = 0, lastY = 0;
const wrap = document.getElementById('canvas-wrap');
wrap.addEventListener('mousedown', e => { if (e.target === svg || e.target.closest('svg')) { dragging = true; lastX = e.clientX; lastY = e.clientY; } });
window.addEventListener('mousemove', e => { if (!dragging) return; state.panX += e.clientX - lastX; state.panY += e.clientY - lastY; lastX = e.clientX; lastY = e.clientY; renderDiagram(); });
window.addEventListener('mouseup', () => dragging = false);
wrap.addEventListener('wheel', e => { e.preventDefault(); const delta = e.deltaY > 0 ? -0.1 : 0.1; state.zoom = Math.max(0.3, Math.min(2.5, state.zoom + delta)); updateAll(); }, { passive: false });

// Copy
document.getElementById('copy-btn').onclick = function() {
  const text = document.getElementById('prompt-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    this.textContent = 'Copied!'; this.classList.add('copied');
    setTimeout(() => { this.textContent = 'Copy'; this.classList.remove('copied'); }, 1500);
  });
};

// ─── MAIN UPDATE ────────────────────────────────────────────────────────────
function updateAll() { renderDiagram(); renderComments(); updatePrompt(); }

// Initial render after layout
requestAnimationFrame(() => { requestAnimationFrame(updateAll); });
window.addEventListener('resize', updateAll);
</script>
</body>
</html>
